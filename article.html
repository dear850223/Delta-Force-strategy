<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4435032913873442"
      crossorigin="anonymous"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="三角洲行动攻略文章详情">
  <meta name="keywords" content="三角洲行动,Delta Force,游戏攻略">
  <title>文章详情 | DELTA FORCE TACTICAL GUIDE</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/article-detail.css">
</head>
<body>

  <nav class="navbar" role="navigation" aria-label="主导航">
    <div class="container navbar__container">
      <a href="index.html" class="navbar__logo">
        <svg class="navbar__logo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <span>DELTA FORCE</span>
      </a>

      <ul class="navbar__menu" id="navMenu">
        <li><a href="index.html" class="navbar__link">首页</a></li>
        <li><a href="maps.html" class="navbar__link">战术地图</a></li>
        <li><a href="weapons.html" class="navbar__link">武器图鉴</a></li>
        <li><a href="guides.html" class="navbar__link">攻略文库</a></li>
        <li><a href="articles.html" class="navbar__link active">攻略文章</a></li>
        <li><a href="data.html" class="navbar__link">数据中心</a></li>
      </ul>

      <button class="navbar__toggle" id="navToggle" aria-label="打开菜单" aria-expanded="false">
        <span class="navbar__toggle-bar"></span>
        <span class="navbar__toggle-bar"></span>
        <span class="navbar__toggle-bar"></span>
      </button>
    </div>
  </nav>

  <main class="section">
    <div class="container">
      <div class="article-detail" id="articleDetail">
      </div>

      <div class="article-not-found" id="articleNotFound" style="display:none;">
        <div class="article-not-found__icon">📄</div>
        <h2>文章未找到</h2>
        <p>抱歉，未找到指定的文章。可能已被移除或链接无效。</p>
        <a href="articles.html" class="article-not-found__link">返回文章列表</a>
      </div>

      <div class="article-related" id="articleRelated">
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer__container">
      <div class="footer__brand">
        <span class="footer__logo">DELTA FORCE</span>
        <p class="footer__desc">三角洲行动战术攻略站 &mdash; 为特战干员提供专业战术数据支持</p>
      </div>
      <div class="footer__links">
        <div class="footer__col">
          <h4>导航</h4>
          <a href="index.html">首页</a>
          <a href="maps.html">战术地图</a>
          <a href="weapons.html">武器图鉴</a>
        </div>
        <div class="footer__col">
          <h4>攻略</h4>
          <a href="guides.html">攻略文库</a>
          <a href="articles.html">攻略文章</a>
          <a href="data.html">数据中心</a>
        </div>
      </div>
      <div class="footer__bottom">
        <p>&copy; 2026 DELTA FORCE Tactical Guide. 本站为玩家自制攻略站，与官方无关。</p>
      </div>
    </div>
  </footer>

  <script type="module">
    import { getArticleById, getAllArticles } from './js/data/articles-data.js';

    const params = new URLSearchParams(window.location.search);
    const articleId = params.get('id');

    const articleDetail = document.getElementById('articleDetail');
    const articleNotFound = document.getElementById('articleNotFound');
    const articleRelated = document.getElementById('articleRelated');

    const categoryColors = {
      beginner: '#00ff41',
      advanced: '#ff6b35',
      weapons: '#00d4ff',
      maps: '#ffd700',
      operators: '#a855f7',
      news: '#ff4444'
    };

    function renderArticle(article) {
      document.title = `${article.title} | DELTA FORCE TACTICAL GUIDE`;

      articleDetail.innerHTML = `
        <div class="article-detail__breadcrumb">
          <a href="articles.html">攻略文章库</a>
          <span class="article-detail__breadcrumb-sep">/</span>
          <span class="article-detail__breadcrumb-cat" style="color: ${categoryColors[article.category] || '#00ff41'}">${article.categoryName}</span>
          <span class="article-detail__breadcrumb-sep">/</span>
          <span>${article.title}</span>
        </div>

        <article class="article-detail__content">
          <header class="article-detail__header">
            <div class="article-detail__badges">
              <span class="article-detail__category" style="--cat-color: ${categoryColors[article.category] || '#00ff41'}">${article.categoryName}</span>
              <span class="article-detail__subcategory">${article.subCategory}</span>
            </div>
            <h1 class="article-detail__title">${article.title}</h1>
            <div class="article-detail__meta">
              <span>📰 来源：${article.source}</span>
              <span>✍ 作者：${article.author}</span>
              <span>📅 日期：${article.date}</span>
            </div>
            <div class="article-detail__tags">
              ${article.tags.map(tag => `<span class="article-detail__tag">#${tag}</span>`).join('')}
            </div>
          </header>

          <div class="article-detail__body">
            ${article.content}
          </div>

          <div class="article-detail__source">
            <p>原文链接：<a href="${article.sourceUrl}" target="_blank" rel="noopener noreferrer">${article.sourceUrl}</a></p>
          </div>
        </article>

        <div class="article-detail__nav">
          <a href="articles.html" class="article-detail__back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="m15 18-6-6 6-6"/>
            </svg>
            返回文章列表
          </a>
        </div>
      `;

      renderRelatedArticles(article);
    }

    function renderRelatedArticles(currentArticle) {
      const related = getAllArticles()
        .filter(a => a.id !== currentArticle.id && a.category === currentArticle.category)
        .slice(0, 4);

      if (related.length === 0) {
        articleRelated.innerHTML = '';
        return;
      }

      articleRelated.innerHTML = `
        <h3 class="article-related__title">相关文章</h3>
        <div class="article-related__grid">
          ${related.map(article => `
            <a href="article.html?id=${article.id}" class="article-related__card">
              <span class="article-related__cat" style="color: ${categoryColors[article.category] || '#00ff41'}">${article.subCategory}</span>
              <h4>${article.title}</h4>
              <p>${article.summary}</p>
            </a>
          `).join('')}
        </div>
      `;
    }

    if (articleId) {
      const article = getArticleById(articleId);
      if (article) {
        articleNotFound.style.display = 'none';
        renderArticle(article);
      } else {
        articleDetail.style.display = 'none';
        articleNotFound.style.display = 'block';
        articleRelated.innerHTML = '';
      }
    } else {
      articleDetail.style.display = 'none';
      articleNotFound.style.display = 'block';
      articleRelated.innerHTML = '';
    }
  </script>
</body>
</html>
